<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ArkGrid Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #e9fbff;
      background: linear-gradient(150deg, #101a27, #203348);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    main { max-width: 360px; }
    img {
      width: 88px;
      height: 88px;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(24,207,227,.35);
    }
    h1 { margin: 18px 0 8px; font-size: 24px; }
    p { margin: 0; color: #b8dbe5; line-height: 1.55; }
  </style>
</head>
<body>
  <main>
    <img src="arkgrid-symbol.png" alt="ArkGrid">
    <h1>ArkGrid CRM</h1>
    <p>当前网络不可用。已缓存的 CRM 页面仍可打开，重新联网后会自动同步最新版本。</p>
  </main>
</body>
</html>
